name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: do NOT set `registry-url` here. It makes setup-node write an
      # .npmrc expecting NODE_AUTH_TOKEN and conflicts with semantic-release's
      # own auth handling.
      # Node 22.14+ is required for npm trusted publishing (OIDC).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted publishing needs npm CLI >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Token-free publish via OIDC (trusted publisher configured on npmjs.com).
      # No NPM_TOKEN needed; provenance is generated automatically.
      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}