name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # NOTE: do NOT set `registry-url` here. It makes setup-node write an
      # .npmrc expecting NODE_AUTH_TOKEN and conflicts with semantic-release's
      # own auth handling.
      # Node 24 is used because it bundles npm >= 11.5.1, which is required for
      # npm trusted publishing (OIDC). Do NOT `npm i -g npm@latest` to upgrade
      # in place — that corrupts npm's dep tree and breaks provenance signing
      # with "Cannot find module 'sigstore'".
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      # Token-free publish via OIDC (trusted publisher configured on npmjs.com).
      # No NPM_TOKEN needed; provenance is generated automatically.
      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}